<!DOCTYPE html>
<html lang="ru">

<head>
    <link rel="icon" href="./favicon.png">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHub — Все курсы Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
            flex-wrap: wrap;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #58a6ff;
            cursor: pointer;
            white-space: nowrap;
        }

        .logo::before {
            content: '>_ ';
            color: #00ff88;
        }

        /* Простые вкладки (без разделения на бесплатные/платные, но оставим для удобства) */
        .tabs {
            display: flex;
            gap: 5px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 4px;
        }

        .tab {
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            color: #8b949e;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            color: #c9d1d9;
        }

        .tab.active {
            background: #161b22;
            color: #00ff88;
        }

        /* Кнопка поддержки */
        .donate-btn {
            background: linear-gradient(90deg, #ff4757, #ff6b81);
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            box-shadow: 0 2px 8px rgba(255, 71, 87, 0.3);
        }

        .donate-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 71, 87, 0.4);
        }

        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        .sidebar {
            width: 300px;
            background: #161b22;
            border-right: 1px solid #30363d;
            height: calc(100vh - 70px);
            position: sticky;
            top: 70px;
            overflow-y: auto;
            padding: 20px 0;
        }

        .section-divider {
            color: #6e7681;
            font-size: 11px;
            padding: 15px 20px 5px;
            text-transform: uppercase;
            border-top: 1px solid #30363d;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
        }

        .course-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .course-item:hover {
            background: #0d1117;
            color: #00ff88;
        }

        .course-item.active {
            background: #0d1117;
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .badge {
            margin-left: auto;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .badge.free {
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .content {
            flex: 1;
            padding: 40px 50px;
            max-width: 1000px;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        h1::before {
            content: '# ';
            color: #6e7681;
        }

        .course-desc {
            color: #8b949e;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        h2 {
            color: #58a6ff;
            font-size: 24px;
            margin: 30px 0 15px;
            border-bottom: 1px solid #30363d;
        }

        h2::before {
            content: '## ';
            color: #6e7681;
        }

        .code-block {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            overflow-x: auto;
        }

        .code-block::before {
            content: 'python';
            position: absolute;
            top: 5px;
            right: 10px;
            color: #6e7681;
            font-size: 11px;
        }

        .code-block pre {
            color: #c9d1d9;
            font-size: 14px;
        }

        .output {
            background: #0d1117;
            border-left: 3px solid #00ff88;
            padding: 12px 20px;
            margin: 10px 0 20px;
            border-radius: 0 6px 6px 0;
            color: #7ee787;
        }

        .output::before {
            content: '>>> ';
            color: #6e7681;
        }

        .task {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin: 25px 0;
        }

        .task-title {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 10px;
        }

        .task-title::before {
            content: '🎯 ';
        }

        .lessons-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .lesson-item {
            padding: 10px;
            margin: 5px 0;
            background: #0d1117;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .lesson-item:hover {
            background: #1c2128;
        }

        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #30363d;
        }

        .nav-btn {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
        }

        .nav-btn:hover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .complete-btn {
            background: #00ff88;
            color: #0d1117;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .content {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="showHome()">CodeHub</div>
        <div class="tabs">
            <div class="tab active" onclick="switchTab('all')">📚 Все курсы</div>
        </div>
        <!-- Кнопка поддержки проекта с ссылкой на ЮMoney -->
        <a href="https://yoomoney.ru/fundraise/1I9526CPHHL.260608" target="_blank" class="donate-btn">
            ❤️ Поддержать проект
        </a>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar"></aside>
        <main class="content" id="content"></main>
    </div>

    <script>
        // ============================================
        // ВСЕ 20 КУРСОВ — ПОЛНОСТЬЮ БЕСПЛАТНЫЕ
        // ============================================

        const allCourses = [
            {
                id: 0, title: "Python для начинающих",
                desc: "Первый шаг в мир программирования. Установка, первая программа, основы синтаксиса.",
                lessons: [
                    {
                        title: "Урок 1.1: Введение в Python", content: `
                    <h3>Что такое Python?</h3>
                    <p>Python — высокоуровневый язык с простым синтаксисом.</p>
                    <ul><li>🌐 Веб-разработка</li><li>🤖 ИИ</li><li>📊 Анализ данных</li></ul>
                    <div class="code-block"><pre><span style="color:#ff7b72;">print</span>(<span style="color:#a5d6ff;">"Hello, World!"</span>)</pre></div>
                    <div class="output">Hello, World!</div>
                    <div class="task"><div class="task-title">Задание</div><p>Выведите "Я изучаю Python!"</p></div>
                ` }
                ]
            },
            {
                id: 1, title: "Типы данных и операторы",
                desc: "Числа, строки, операции и приведение типов.",
                lessons: [
                    { title: "Урок 2.1: Типы данных", content: `<h3>int, float, str, bool</h3><div class="code-block"><pre>x = 42\npi = 3.14\nname = "Анна"\nis_ok = True</pre></div><div class="task"><div class="task-title">Задание</div><p>Создайте переменные всех типов.</p></div>` }
                ]
            },
            {
                id: 2, title: "Условия и циклы",
                desc: "if/else, for, while — управление потоком.",
                lessons: [
                    { title: "Урок 3.1: if/else", content: `<div class="code-block"><pre>age = 18\nif age >= 18:\n    print("Взрослый")\nelse:\n    print("Ребёнок")</pre></div>` }
                ]
            },
            {
                id: 3, title: "Функции",
                desc: "def, return, аргументы, области видимости.",
                lessons: [
                    { title: "Урок 4.1: Создание функций", content: `<div class="code-block"><pre>def greet(name):\n    return f"Привет, {name}!"\n\nprint(greet("Мир"))</pre></div><div class="output">Привет, Мир!</div>` }
                ]
            },
            {
                id: 4, title: "Списки и словари",
                desc: "Коллекции данных: list, dict, tuple.",
                lessons: [
                    { title: "Урок 5.1: Списки", content: `<div class="code-block"><pre>fruits = ["яблоко", "банан"]\nfruits.append("апельсин")\nprint(fruits[0])</pre></div>` }
                ]
            },
            {
                id: 5, title: "Работа с файлами",
                desc: "Чтение и запись файлов, менеджер контекста with.",
                lessons: [
                    { title: "Урок 6.1: open/read/write", content: `<div class="code-block"><pre>with open("file.txt", "w") as f:\n    f.write("Hello")\n\nwith open("file.txt", "r") as f:\n    print(f.read())</pre></div>` }
                ]
            },
            {
                id: 6, title: "ООП: Классы и объекты",
                desc: "Основы объектно-ориентированного программирования.",
                lessons: [
                    { title: "Урок 7.1: Классы", content: `<div class="code-block"><pre>class Dog:\n    def __init__(self, name):\n        self.name = name\n    def bark(self):\n        print(f"{self.name} Гав!")\n\ndog = Dog("Бобик")\ndog.bark()</pre></div>` }
                ]
            },
            {
                id: 7, title: "Обработка ошибок",
                desc: "try/except/finally, обработка исключений.",
                lessons: [
                    { title: "Урок 8.1: try/except", content: `<div class="code-block"><pre>try:\n    x = int(input("Число: "))\n    print(10 / x)\nexcept ZeroDivisionError:\n    print("На ноль нельзя!")</pre></div>` }
                ]
            },
            {
                id: 8, title: "Модули и pip",
                desc: "Импорт модулей, установка сторонних библиотек.",
                lessons: [
                    { title: "Урок 9.1: import", content: `<div class="code-block"><pre>import random\nprint(random.randint(1, 100))</pre></div>` }
                ]
            },
            {
                id: 9, title: "Продвинутый ООП",
                desc: "Магические методы, наследование, полиморфизм.",
                lessons: [
                    { title: "Урок 10.1: Магические методы", content: `<div class="code-block"><pre>class Book:\n    def __init__(self, title):\n        self.title = title\n    def __str__(self):\n        return f"Книга: {self.title}"</pre></div>` }
                ]
            },
            {
                id: 10, title: "Декораторы",
                desc: "Расширение поведения функций, @wraps.",
                lessons: [
                    { title: "Урок 11.1: Декораторы", content: `<div class="code-block"><pre>def my_decorator(func):\n    def wrapper():\n        print("До")\n        func()\n        print("После")\n    return wrapper\n\n@my_decorator\ndef hello():\n    print("Привет")\n\nhello()</pre></div>` }
                ]
            },
            {
                id: 11, title: "Генераторы и итераторы",
                desc: "Ленивые вычисления, ключевое слово yield.",
                lessons: [
                    { title: "Урок 12.1: yield", content: `<div class="code-block"><pre>def count_down(n):\n    while n > 0:\n        yield n\n        n -= 1\n\nfor x in count_down(3):\n    print(x)</pre></div>` }
                ]
            },
            {
                id: 12, title: "Метаклассы",
                desc: "Классы, создающие классы, type() и metaclass.",
                lessons: [
                    { title: "Урок 13.1: type", content: `<div class="code-block"><pre>User = type('User', (), {'name': 'Иван'})\nu = User()\nprint(u.name)</pre></div>` }
                ]
            },
            {
                id: 13, title: "Асинхронность (asyncio)",
                desc: "async/await, конкурентное программирование.",
                lessons: [
                    { title: "Урок 14.1: async/await", content: `<div class="code-block"><pre>import asyncio\n\nasync def fetch():\n    await asyncio.sleep(1)\n    return "Готово!"\n\nprint(asyncio.run(fetch()))</pre></div>` }
                ]
            },
            {
                id: 14, title: "Type Hints",
                desc: "Аннотации типов, mypy, дженерики.",
                lessons: [
                    { title: "Урок 15.1: Аннотации", content: `<div class="code-block"><pre>def add(a: int, b: int) -> int:\n    return a + b\n\nnums: list[int] = [1, 2, 3]</pre></div>` }
                ]
            },
            {
                id: 15, title: "SQL + Python",
                desc: "SQLite, PostgreSQL, SQLAlchemy ORM.",
                lessons: [
                    { title: "Урок 16.1: SQLite", content: `<div class="code-block"><pre>import sqlite3\nconn = sqlite3.connect("db.db")\nc = conn.cursor()\nc.execute("CREATE TABLE users (id INT, name TEXT)")</pre></div>` }
                ]
            },
            {
                id: 16, title: "FastAPI",
                desc: "Современный веб-фреймворк с автодокументацией.",
                lessons: [
                    { title: "Урок 17.1: FastAPI", content: `<div class="code-block"><pre>from fastapi import FastAPI\napp = FastAPI()\n\n@app.get("/")\ndef root():\n    return {"msg": "Hello!"}</pre></div>` }
                ]
            },
            {
                id: 17, title: "Data Science (Pandas, NumPy)",
                desc: "Анализ данных и визуализация.",
                lessons: [
                    { title: "Урок 18.1: Pandas", content: `<div class="code-block"><pre>import pandas as pd\ndf = pd.DataFrame({'name': ['Аня', 'Боря'], 'age': [25, 30]})\nprint(df.head())</pre></div>` }
                ]
            },
            {
                id: 18, title: "Telegram-боты (aiogram)",
                desc: "Создание ботов с нуля.",
                lessons: [
                    { title: "Урок 19.1: Эхо-бот", content: `<div class="code-block"><pre>from aiogram import Bot, Dispatcher\n# ... базовый код бота</pre></div>` }
                ]
            },
            {
                id: 19, title: "Парсинг данных",
                desc: "BeautifulSoup, Selenium, Scrapy.",
                lessons: [
                    { title: "Урок 20.1: BeautifulSoup", content: `<div class="code-block"><pre>import requests\nfrom bs4 import BeautifulSoup\nr = requests.get("https://example.com")\nsoup = BeautifulSoup(r.text, "html.parser")</pre></div>` }
                ]
            }
        ];

        // Состояние
        let currentCourseIndex = 0;
        let currentLessonIndex = 0;
        const completedLessons = new Set();

        // Рендер сайдбара
        function renderSidebar() {
            let html = `
            <div class="section-divider">
                <span>📚 Все курсы Python</span>
                <span class="count">${allCourses.length}</span>
            </div>
            ${allCourses.map((c, idx) => `
                <div class="course-item ${idx === currentCourseIndex ? 'active' : ''}" 
                     onclick="openCourse(${idx})">
                    <span>${(idx + 1).toString().padStart(2, '0')}</span>
                    ${c.title}
                    <span class="badge free">FREE</span>
                </div>
            `).join('')}
        `;
            document.getElementById('sidebar').innerHTML = html;
        }

        // Рендер контента курса
        function renderCourse() {
            const course = allCourses[currentCourseIndex];
            const lesson = course.lessons[currentLessonIndex];
            const isLastLesson = currentLessonIndex === course.lessons.length - 1;

            document.getElementById('content').innerHTML = `
            <h1>${course.title}</h1>
            <p class="course-desc">${course.desc}</p>

            <h2>📚 Уроки курса</h2>
            <div class="lessons-box">
                ${course.lessons.map((l, i) => `
                    <div class="lesson-item" onclick="openLesson(${i})">
                        <span>${(i + 1).toString().padStart(2, '0')}</span>
                        ${l.title}
                        ${completedLessons.has(`${course.id}-${i}`) ? ' ✅' : ''}
                    </div>
                `).join('')}
            </div>

            <h2>${lesson.title}</h2>
            ${lesson.content}

            <div class="nav-buttons">
                <button class="nav-btn prev" onclick="prevLesson()" 
                    ${currentLessonIndex === 0 ? 'disabled' : ''}>
                    ← Предыдущий
                </button>
                <button class="complete-btn" onclick="completeLesson()">✓ Завершить урок</button>
                <button class="nav-btn next" onclick="nextLesson()"
                    ${isLastLesson ? 'disabled' : ''}>
                    Следующий →
                </button>
            </div>
        `;
        }

        // Действия
        function openCourse(idx) {
            currentCourseIndex = idx;
            currentLessonIndex = 0;
            renderSidebar();
            renderCourse();
            window.scrollTo(0, 0);
        }

        function openLesson(idx) {
            currentLessonIndex = idx;
            renderCourse();
            window.scrollTo(0, 0);
        }

        function prevLesson() {
            if (currentLessonIndex > 0) {
                currentLessonIndex--;
                renderCourse();
            }
        }

        function nextLesson() {
            const course = allCourses[currentCourseIndex];
            if (currentLessonIndex < course.lessons.length - 1) {
                currentLessonIndex++;
                renderCourse();
            }
        }

        function completeLesson() {
            const course = allCourses[currentCourseIndex];
            completedLessons.add(`${course.id}-${currentLessonIndex}`);
            renderCourse();
        }

        function switchTab() {
            // Просто заглушка, всё равно все курсы бесплатны
            renderSidebar();
            renderCourse();
        }

        function showHome() {
            currentCourseIndex = 0;
            currentLessonIndex = 0;
            renderSidebar();
            renderCourse();
        }

        // Запуск
        renderSidebar();
        renderCourse();
    </script>
</body>

</html>
