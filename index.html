<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeHub — Все курсы Python</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
        }

        body {
            background: #0d1117;
            color: #c9d1d9;
            min-height: 100vh;
        }

        /* Header */
        header {
            background: #161b22;
            border-bottom: 1px solid #30363d;
            padding: 15px 30px;
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 20px;
        }

        .logo {
            font-size: 22px;
            font-weight: bold;
            color: #58a6ff;
            cursor: pointer;
            white-space: nowrap;
        }

        .logo::before {
            content: '>_ ';
            color: #00ff88;
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 5px;
            background: #0d1117;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 4px;
        }

        .tab {
            padding: 8px 18px;
            border-radius: 6px;
            cursor: pointer;
            color: #8b949e;
            font-size: 14px;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .tab:hover {
            color: #c9d1d9;
        }

        .tab.active {
            background: #161b22;
            color: #00ff88;
        }

        .tab.pro.active {
            color: #ffa657;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
            color: #8b949e;
            font-size: 13px;
        }

        .balance {
            background: #0d1117;
            border: 1px solid #ffa657;
            padding: 6px 12px;
            border-radius: 6px;
            color: #ffa657;
            font-weight: bold;
        }

        /* Layout */
        .container {
            display: flex;
            max-width: 1400px;
            margin: 0 auto;
        }

        /* Sidebar */
        .sidebar {
            width: 300px;
            background: #161b22;
            border-right: 1px solid #30363d;
            height: calc(100vh - 60px);
            position: sticky;
            top: 60px;
            overflow-y: auto;
            padding: 20px 0;
        }

        .sidebar h3 {
            color: #8b949e;
            font-size: 12px;
            text-transform: uppercase;
            padding: 0 20px 10px;
            letter-spacing: 1px;
        }

        .section-divider {
            color: #6e7681;
            font-size: 11px;
            padding: 15px 20px 5px;
            text-transform: uppercase;
            border-top: 1px solid #30363d;
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .section-divider .count {
            color: #6e7681;
            font-size: 10px;
        }

        .course-item {
            padding: 10px 20px;
            cursor: pointer;
            transition: all 0.2s;
            border-left: 3px solid transparent;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .course-item:hover {
            background: #0d1117;
            color: #00ff88;
        }

        .course-item.pro:hover {
            color: #ffa657;
        }

        .course-item.active {
            background: #0d1117;
            border-left-color: #00ff88;
            color: #00ff88;
        }

        .course-item.pro.active {
            border-left-color: #ffa657;
            color: #ffa657;
        }

        .course-item .num {
            color: #6e7681;
            font-size: 12px;
            min-width: 30px;
        }

        .course-item .badge {
            margin-left: auto;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 3px;
        }

        .badge.free {
            color: #00ff88;
            border: 1px solid #00ff88;
        }

        .badge.paid {
            color: #ffa657;
            border: 1px solid #ffa657;
        }

        .badge.locked {
            color: #6e7681;
            border: 1px solid #30363d;
        }

        .badge.owned {
            color: #58a6ff;
            border: 1px solid #58a6ff;
        }

        /* Main content */
        .content {
            flex: 1;
            padding: 40px 50px;
            max-width: 1000px;
        }

        .breadcrumb {
            color: #6e7681;
            font-size: 13px;
            margin-bottom: 20px;
        }

        .breadcrumb span {
            color: #00ff88;
        }

        .course-item.pro~* .breadcrumb span,
        .pro-mode .breadcrumb span {
            color: #ffa657;
        }

        h1 {
            color: #c9d1d9;
            font-size: 36px;
            margin-bottom: 10px;
        }

        h1::before {
            content: '# ';
            color: #6e7681;
        }

        .course-desc {
            color: #8b949e;
            font-size: 16px;
            margin-bottom: 20px;
            line-height: 1.6;
        }

        .course-info {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .info-badge {
            background: #161b22;
            border: 1px solid #30363d;
            padding: 8px 15px;
            border-radius: 6px;
            font-size: 13px;
            color: #c9d1d9;
        }

        .info-badge::before {
            content: '▸ ';
            color: #00ff88;
        }

        .pro-mode .info-badge::before {
            color: #ffa657;
        }

        h2 {
            color: #58a6ff;
            font-size: 24px;
            margin: 30px 0 15px;
            padding-bottom: 8px;
            border-bottom: 1px solid #30363d;
        }

        .pro-mode h2 {
            color: #ffa657;
        }

        h2::before {
            content: '## ';
            color: #6e7681;
        }

        h3 {
            color: #7ee787;
            font-size: 18px;
            margin: 20px 0 10px;
        }

        h3::before {
            content: '### ';
            color: #6e7681;
        }

        p {
            line-height: 1.7;
            margin-bottom: 15px;
            color: #c9d1d9;
        }

        ul,
        ol {
            margin: 10px 0 20px 30px;
            line-height: 1.8;
        }

        li {
            margin-bottom: 8px;
        }

        /* Code blocks */
        .code-block {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            position: relative;
            overflow-x: auto;
        }

        .code-block::before {
            content: 'python';
            position: absolute;
            top: 5px;
            right: 10px;
            color: #6e7681;
            font-size: 11px;
        }

        .code-block pre {
            color: #c9d1d9;
            font-size: 14px;
            line-height: 1.6;
        }

        .keyword {
            color: #ff7b72;
        }

        .function {
            color: #d2a8ff;
        }

        .string {
            color: #a5d6ff;
        }

        .comment {
            color: #8b949e;
            font-style: italic;
        }

        .variable {
            color: #ffa657;
        }

        .number {
            color: #79c0ff;
        }

        .operator {
            color: #ff7b72;
        }

        .decorator {
            color: #d2a8ff;
        }

        .class-name {
            color: #ffa657;
        }

        /* Output */
        .output {
            background: #0d1117;
            border-left: 3px solid #00ff88;
            padding: 12px 20px;
            margin: 10px 0 20px;
            border-radius: 0 6px 6px 0;
            color: #7ee787;
            font-size: 14px;
        }

        .output::before {
            content: '>>> ';
            color: #6e7681;
        }

        /* Task */
        .task {
            background: rgba(0, 255, 136, 0.05);
            border: 1px solid #00ff88;
            border-radius: 8px;
            padding: 20px;
            margin: 25px 0;
        }

        .pro-mode .task {
            background: rgba(255, 166, 87, 0.05);
            border-color: #ffa657;
        }

        .task-title {
            color: #00ff88;
            font-weight: bold;
            margin-bottom: 10px;
            font-size: 16px;
        }

        .pro-mode .task-title {
            color: #ffa657;
        }

        .task-title::before {
            content: '🎯 ';
        }

        .task-hint {
            color: #8b949e;
            font-size: 13px;
            margin-top: 10px;
            font-style: italic;
        }

        .task-hint::before {
            content: '💡 Подсказка: ';
            color: #ffa657;
            font-style: normal;
        }

        /* Locked screen */
        .locked-screen {
            background: #161b22;
            border: 2px solid #ffa657;
            border-radius: 12px;
            padding: 50px 30px;
            text-align: center;
            margin: 30px 0;
        }

        .lock-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .locked-screen h2 {
            border: none;
            color: #ffa657;
            margin-bottom: 15px;
        }

        .price-tag {
            font-size: 48px;
            color: #ffa657;
            font-weight: bold;
            margin: 20px 0;
        }

        .price-tag::after {
            content: ' ₽';
            font-size: 32px;
        }

        .buy-btn {
            background: linear-gradient(90deg, #ffa657, #ff7b72);
            color: #0d1117;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            margin-top: 20px;
            transition: all 0.2s;
        }

        .buy-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(255, 166, 87, 0.3);
        }

        .buy-btn::before {
            content: '💎 ';
        }

        .features {
            text-align: left;
            max-width: 500px;
            margin: 30px auto;
        }

        .features li {
            color: #c9d1d9;
        }

        .features li::marker {
            color: #ffa657;
        }

        /* Navigation */
        .nav-buttons {
            display: flex;
            justify-content: space-between;
            margin-top: 50px;
            padding-top: 30px;
            border-top: 1px solid #30363d;
        }

        .nav-btn {
            background: transparent;
            color: #58a6ff;
            border: 1px solid #30363d;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            transition: all 0.2s;
        }

        .pro-mode .nav-btn {
            color: #ffa657;
        }

        .nav-btn:hover {
            border-color: #58a6ff;
            background: rgba(88, 166, 255, 0.1);
        }

        .pro-mode .nav-btn:hover {
            border-color: #ffa657;
            background: rgba(255, 166, 87, 0.1);
        }

        .nav-btn.next::after {
            content: ' →';
        }

        .nav-btn.prev::before {
            content: '← ';
        }

        .nav-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .complete-btn {
            background: #00ff88;
            color: #0d1117;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            font-size: 14px;
            font-weight: bold;
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: #161b22;
            border: 1px solid #ffa657;
            border-radius: 12px;
            padding: 40px;
            max-width: 500px;
            width: 90%;
            text-align: center;
        }

        .modal-content h2 {
            border: none;
            color: #ffa657;
        }

        .payment-methods {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 20px 0;
        }

        .payment-method {
            background: #0d1117;
            border: 1px solid #30363d;
            padding: 15px;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .payment-method:hover {
            border-color: #ffa657;
        }

        .payment-method.selected {
            border-color: #ffa657;
            background: rgba(255, 166, 87, 0.1);
        }

        /* Lesson list */
        .lessons-box {
            background: #161b22;
            border: 1px solid #30363d;
            border-radius: 8px;
            padding: 15px;
            margin: 15px 0;
        }

        .lesson-item {
            padding: 10px;
            margin: 5px 0;
            background: #0d1117;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .lesson-item:hover {
            background: #1c2128;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #0d1117;
        }

        ::-webkit-scrollbar-thumb {
            background: #30363d;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #58a6ff;
        }

        @media (max-width: 768px) {
            .sidebar {
                display: none;
            }

            .content {
                padding: 20px;
            }

            h1 {
                font-size: 26px;
            }

            .tabs {
                font-size: 12px;
            }

            .tab {
                padding: 6px 12px;
            }
        }
    </style>
</head>

<body>
    <header>
        <div class="logo" onclick="showHome()">CodeHub</div>

        <div class="tabs">
            <div class="tab active" id="tabFree" onclick="switchTab('free')">
                📘 Бесплатные
            </div>
            <div class="tab pro" id="tabPro" onclick="switchTab('pro')">
                💎 Pro-курсы
            </div>
        </div>

        <div class="user-info" id="userInfo" style="display:none;">
            <span>user@codehub</span>
            <div class="balance">💰 <span id="balance">500</span> ₽</div>
        </div>
    </header>

    <div class="container">
        <aside class="sidebar" id="sidebar">
            <!-- Курсы будут рендериться динамически -->
        </aside>

        <main class="content" id="content">
            <!-- Контент курсов -->
        </main>
    </div>

    <!-- Modal оплаты -->
    <div class="modal" id="paymentModal">
        <div class="modal-content">
            <h2>💎 Покупка курса</h2>
            <p id="modalCourseName" style="color:#8b949e; margin-bottom: 20px;"></p>
            <div class="price-tag" id="modalPrice">50</div>
            <p style="color:#8b949e;">Выберите способ оплаты:</p>
            <div class="payment-methods">
                <div class="payment-method selected" onclick="selectPayment(this, 'card')">💳 Карта</div>
                <div class="payment-method" onclick="selectPayment(this, 'sbp')">📱 СБП</div>
                <div class="payment-method" onclick="selectPayment(this, 'yoomoney')">🟧 ЮMoney</div>
                <div class="payment-method" onclick="selectPayment(this, 'crypto')">₿ Крипто</div>
            </div>
            <button class="buy-btn" onclick="confirmPurchase()">Оплатить и получить доступ</button>
            <p style="margin-top: 20px;">
                <a href="#" onclick="closeModal()" style="color:#8b949e;">Отмена</a>
            </p>
        </div>
    </div>

    <script>
        // ============================================
        // ВСЕ 20 КУРСОВ В ОДНОМ МАССИВЕ
        // ============================================

        const allCourses = [
            // БЕСПЛАТНЫЕ КУРСЫ (0-9)
            {
                id: 0, type: 'free',
                title: "Python для начинающих",
                desc: "Самый первый шаг в мир программирования. Установка Python, первая программа, основы синтаксиса.",
                lessons: [
                    {
                        title: "Урок 1.1: Введение в Python",
                        content: `
                            <h3>Что такое Python?</h3>
                            <p>Python — это высокоуровневый язык программирования с простым и читаемым синтаксисом.</p>
                            <ul>
                                <li>🌐 Веб-разработка</li>
                                <li>🤖 Искусственный интеллект</li>
                                <li>📊 Анализ данных</li>
                                <li>⚙️ Автоматизация</li>
                            </ul>
                            <h3>Первая программа</h3>
                            <div class="code-block">
<pre><span class="keyword">print</span>(<span class="string">"Hello, World!"</span>)</pre>
                            </div>
                            <div class="output">Hello, World!</div>
                            <div class="task">
                                <div class="task-title">Задание</div>
                                <p>Выведите на экран: "Я изучаю Python!"</p>
                            </div>
                        `
                    },
                    {
                        title: "Урок 1.2: Переменные",
                        content: `
                            <h3>Что такое переменная?</h3>
                            <p>Переменная — это имя, которое хранит значение.</p>
                            <div class="code-block">
<pre><span class="variable">name</span> = <span class="string">"Алексей"</span>
<span class="variable">age</span> = <span class="number">25</span>
<span class="variable">is_student</span> = <span class="keyword">True</span>

<span class="keyword">print</span>(<span class="variable">name</span>, <span class="variable">age</span>, <span class="variable">is_student</span>)</pre>
                            </div>
                            <div class="output">Алексей 25 True</div>
                            <div class="task">
                                <div class="task-title">Задание</div>
                                <p>Создайте переменные: city, temperature, is_sunny. Выведите их.</p>
                            </div>
                        `
                    },
                    {
                        title: "Урок 1.3: Ввод данных",
                        content: `
                            <h3>Функция input()</h3>
                            <div class="code-block">
<pre><span class="variable">name</span> = <span class="keyword">input</span>(<span class="string">"Как тебя зовут? "</span>)
<span class="keyword">print</span>(<span class="string">"Привет, "</span> + <span class="variable">name</span>)</pre>
                            </div>
                            <div class="task">
                                <div class="task-title">Задание</div>
                                <p>Спросите имя и возраст, выведите приветствие.</p>
                            </div>
                        `
                    }
                ]
            },
            {
                id: 1, type: 'free',
                title: "Типы данных и операторы",
                desc: "Изучаем основные типы данных в Python и операции над ними.",
                lessons: [
                    {
                        title: "Урок 2.1: Типы данных",
                        content: `
                            <h3>Основные типы</h3>
                            <div class="code-block">
<pre><span class="comment"># int, float, str, bool</span>
<span class="variable">x</span> = <span class="number">42</span>          <span class="comment"># int</span>
<span class="variable">pi</span> = <span class="number">3.14</span>       <span class="comment"># float</span>
<span class="variable">msg</span> = <span class="string">"Hi"</span>     <span class="comment"># str</span>
<span class="variable">flag</span> = <span class="keyword">True</span>    <span class="comment"># bool</span>

<span class="keyword">print</span>(<span class="keyword">type</span>(<span class="variable">x</span>))   <span class="comment"># &lt;class 'int'&gt;</span></pre>
                            </div>
                            <div class="task">
                                <div class="task-title">Задание</div>
                                <p>Создайте переменные всех типов и выведите их типы.</p>
                            </div>
                        `
                    },
                    {
                        title: "Урок 2.2: Арифметика",
                        content: `
                            <h3>Операции с числами</h3>
                            <div class="code-block">
<pre><span class="variable">a</span>, <span class="variable">b</span> = <span class="number">10</span>, <span class="number">3</span>
<span class="keyword">print</span>(<span class="variable">a</span> <span class="operator">+</span> <span class="variable">b</span>)   <span class="comment"># 13</span>
<span class="keyword">print</span>(<span class="variable">a</span> <span class="operator">**</span> <span class="variable">b</span>)  <span class="comment"># 1000</span>
<span class="keyword">print</span>(<span class="variable">a</span> <span class="operator">%</span> <span class="variable">b</span>)   <span class="comment"># 1</span></pre>
                            </div>
                            <div class="task">
                                <div class="task-title">Задание</div>
                                <p>Сделайте калькулятор для двух чисел.</p>
                            </div>
                        `
                    }
                ]
            },
            {
                id: 2, type: 'free', title: "Условия и циклы", desc: "Управление потоком выполнения программы.", lessons: [
                    {
                        title: "Урок 3.1: if/elif/else",
                        content: `
                        <h3>Условный оператор</h3>
                        <div class="code-block">
<pre><span class="keyword">if</span> <span class="variable">age</span> <span class="operator">&gt;=</span> <span class="number">18</span>:
    <span class="keyword">print</span>(<span class="string">"Взрослый"</span>)
<span class="keyword">elif</span> <span class="variable">age</span> <span class="operator">&gt;=</span> <span class="number">14</span>:
    <span class="keyword">print</span>(<span class="string">"Подросток"</span>)
<span class="keyword">else</span>:
    <span class="keyword">print</span>(<span class="string">"Ребёнок"</span>)</pre>
                        </div>
                    `
                    },
                    {
                        title: "Урок 3.2: Циклы for/while",
                        content: `
                        <h3>Цикл for</h3>
                        <div class="code-block">
<pre><span class="keyword">for</span> <span class="variable">i</span> <span class="keyword">in</span> <span class="function">range</span>(<span class="number">5</span>):
    <span class="keyword">print</span>(<span class="variable">i</span>)

<span class="variable">n</span> = <span class="number">0</span>
<span class="keyword">while</span> <span class="variable">n</span> <span class="operator">&lt;</span> <span class="number">3</span>:

        function renderSidebar() {

            let sidebarHTML = '';

            if (currentTab === 'free') {

            } else {
                sidebarHTML = `

                }).join('')}

            document.getElementById('sidebar').innerHTML = sidebarHTML;

            const course = allCourses[currentCourseIndex];
            const isPro = course.type === 'pro';

            // Переключаем режим оформления
            document.body.classList.toggle('pro-mode', isPro);

            renderSidebar();
            renderCourse();
            window.scrollTo(0, 0);
        }

        function openLesson(idx) {
            currentLessonIndex = idx;
            renderCourse();
            window.scrollTo(0, 0);
        }

        function prevLesson() {
            if (currentLessonIndex > 0) {
                currentLessonIndex--;
                renderCourse();
            }
        }

        function nextLesson() {
            const course = allCourses[currentCourseIndex];
            if (currentLessonIndex < course.lessons.length - 1) {
                currentLessonIndex++;
                renderCourse();
            }
        }

        function completeLesson() {
            const course = allCourses[currentCourseIndex];
            completedLessons.add(`${course.id}-${currentLessonIndex}`);
            renderCourse();
        }

        function buyCourse() {
            const course = allCourses[currentCourseIndex];
            if (balance < course.price) {
                alert('❌ Недостаточно средств! Пополните баланс.');
                return;
            }
            document.getElementById('modalCourseName').textContent = course.title;
            document.getElementById('modalPrice').textContent = course.price;
            document.getElementById('paymentModal').classList.add('active');
        }

        function confirmPurchase() {
            const course = allCourses[currentCourseIndex];
            balance -= course.price;
            ownedProCourses.add(course.id);
            document.getElementById('balance').textContent = balance;
            document.getElementById('paymentModal').classList.remove('active');

            renderSidebar();
            renderCourse();
            alert(`🎉 Курс "${course.title}" успешно куплен!`);
        }

        function closeModal() {
            document.getElementById('paymentModal').classList.remove('active');
        }

        function showHome() {
            switchTab('free');
        }

        // Запуск
        renderSidebar();
        renderCourse();
    </script>
</body>

</html>
